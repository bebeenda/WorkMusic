<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bateria Interativa</title>
<link href="https://fonts.googleapis.com/css2?family=Cute+Font&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>

/* =====================================================
   RESET — mesmo padrão do original
===================================================== */
*, *:before, *:after {
  position: relative;
  box-sizing: border-box;
}
*:before, *:after { content: ""; position: absolute; }

html, body { width: 100%; height: 100%; margin: 0; padding: 0; }

/* =====================================================
   CORES (idênticas ao original)
===================================================== */
:root {
  --bg:               #7a7a7a;
  --drum-rim:         #b0b8c0;
  --drum-head:        #F7ECDC;
  --drum-head-shadow: #E9DFD2;
  --drum-shell:       #3a5c3a;
  --drum-shell-dark:  #233823;
  --drum-foot:        #8a9298;
  --cymbal:           #ffd65d;
  --cymbal-dark:      #c9a020;
}

/* =====================================================
   BODY
===================================================== */
body {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: radial-gradient(120% 100% at 50% 40%, #888888 0%, #757575 55%, #636363 100%);
  font-family: 'Cute Font', cursive;
  min-height: 100vh;
  overflow: hidden;
}

/* =====================================================
   WRAPPER — aumentado para caber só o kit
===================================================== */
.wrapper {
  position: relative;
  width: 400px;
  height: 300px;
  transform-origin: center center; /* escala dinâmica aplicada via JS (fitKit) */
}

/* =====================================================
   DRUM CONTAINER — deslocado para dar espaço aos pratos à esquerda
===================================================== */
.drum {
  position: absolute;
  top: 0; left: 75px; /* bumbo como ponto central: centro do bumbo = x200 (centro do palco) */
  width: 300px; height: 100%;
}

/* =====================================================
   RIM
===================================================== */
.rim { position: absolute; width: 100%; height: 100%; }
.rim div {
  position: absolute;
  left: -3px;
  width: calc(100% + 6px);
  height: 3px;
  border-radius: 10px;
  background: var(--drum-rim);
}

/* =====================================================
   RUG (tension rods)
===================================================== */
.rug { position: absolute; width: 100%; height: 100%; }
.rug div {
  position: absolute;
  width: 5px; height: 12px;
  background: var(--drum-rim);
}
.rug div:before { left: 2px; width: 1px; height: 12px; background: var(--drum-rim); }
.rug div.top:before    { top: -10px; }
.rug div.bottom:before { bottom: -10px; }

/* =====================================================
   CURSOR POINTER em todos os elementos clicáveis
===================================================== */
.bass, .floor, .snare, .hightam, .midtam, .hi-hat-cymbal, .ride-cymbal, .crash-cymbal {
  cursor: pointer;
}

/* =====================================================
   FLOOR TOM (surdo)
   pernas alongadas para alcançar a linha do chão (y=284)
===================================================== */
.floor {
  position: absolute;
  top: 152px; left: 40px;
  width: 52px; height: 90px;
}
.floor .tam {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: var(--drum-shell-dark);
  overflow: hidden;
}
.floor .tam:before {
  top: -25px; left: -2px;
  width: 150%; height: 122%;
  background: #4a7a4a;
  border-radius: 50%;
}
.floor .tam .rim div:nth-of-type(1) { top: 0; }
.floor .tam .rim div:nth-of-type(2) { bottom: 0; }
.floor .tam .rug div:nth-of-type(1) { top: 10px;    left: 8px; }
.floor .tam .rug div:nth-of-type(2) { top: 10px;    right: 8px; }
.floor .tam .rug div:nth-of-type(3) { bottom: 10px; left: 8px; }
.floor .tam .rug div:nth-of-type(4) { bottom: 10px; right: 8px; }
.floor span {
  display: block; position: absolute;
  bottom: -42px; width: 5px; height: 66px;
  background: var(--drum-rim);
}
.floor span:before { top: 7px;  left: -2px; width: 10px; height: 12px; background: var(--drum-foot); }
.floor span:after  { top: 47px; left: -1px; width: 7px;  height: 19px; background: var(--drum-foot); }
.floor span:nth-of-type(1) { left: -8px;  transform: rotate(6deg); }
.floor span:nth-of-type(2) { right: -8px; transform: rotate(-6deg); }

/* =====================================================
   SNARE (caixa)
===================================================== */
.snare {
  position: absolute;
  top: 145px; left: 140px;
  width: 60px; height: 30px;
}
.snare .tam {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: var(--drum-shell-dark);
  transform: rotate(0deg);
  overflow: hidden;
}
.snare .tam:before {
  top: -15px; left: -35px;
  width: 150%; height: 122%;
  background: #4a7a4a;
  border-radius: 50%;
}
.snare .tam .rim div:nth-of-type(1) { top: 0; }
.snare .tam .rim div:nth-of-type(2) { bottom: 0; }
.snare .tam .rug div:nth-of-type(1) { top: 10px;    left: 12px; }
.snare .tam .rug div:nth-of-type(2) { top: 10px;    right: 12px; }
.snare .tam .rug div:nth-of-type(3) { bottom: 10px; left: 12px; }
.snare .tam .rug div:nth-of-type(4) { bottom: 10px; right: 12px; }
.snare span { display: block; position: absolute; width: 5px; background: var(--drum-rim); }
.snare span:nth-of-type(1) { left: 26px; bottom: -109px; width: 5px; height: 110px; transform: rotate(0); }
.snare span:nth-of-type(1):before { top: 57px; left: -3px; width: 11px; height: 8px; background: var(--drum-foot); }
.snare span:nth-of-type(1):after  { top: 98px; left: -1px; width: 7px; height: 13px; background: var(--drum-foot); }
.snare span:nth-of-type(2) { right: 19px; bottom: -109px; height: 45px; transform: rotate(-23deg); }
.snare span:nth-of-type(2):after { top: 33px; left: -1px; width: 7px; height: 13px; background: var(--drum-foot); }
.snare span:nth-of-type(3) { left: 16px; bottom: -109px; height: 45px; transform: rotate(23deg); }
.snare span:nth-of-type(3):after { top: 33px; left: -1px; width: 7px; height: 13px; background: var(--drum-foot); }

/* =====================================================
   HIGH TOM (tom1) e MID TOM (tom2)
===================================================== */
.hightam, .midtam {
  position: absolute;
  top: 114px; left: 90px;
  width: 45px; height: 40px;
}
.midtam { top: 110px; left: 139px; }
.hightam .tam, .midtam .tam {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: var(--drum-shell-dark);
  transform: rotate(0deg);
  overflow: hidden;
}
.hightam .tam:before, .midtam .tam:before {
  top: -15px; left: -35px;
  width: 150%; height: 122%;
  background: #4a7a4a;
  border-radius: 50%;
}
.hightam .tam .rim div:nth-of-type(1), .midtam .tam .rim div:nth-of-type(1) { top: 0; }
.hightam .tam .rim div:nth-of-type(2), .midtam .tam .rim div:nth-of-type(2) { bottom: 0; }
.hightam .tam .rug div:nth-of-type(1), .midtam .tam .rug div:nth-of-type(1) { top: 10px;    left: 8px; }
.hightam .tam .rug div:nth-of-type(2), .midtam .tam .rug div:nth-of-type(2) { top: 10px;    right: 8px; }
.hightam .tam .rug div:nth-of-type(3), .midtam .tam .rug div:nth-of-type(3) { bottom: 10px; left: 8px; }
.hightam .tam .rug div:nth-of-type(4), .midtam .tam .rug div:nth-of-type(4) { bottom: 10px; right: 8px; }
.hightam span, .midtam span {
  display: block; position: absolute;
  top: 18px; left: 26px;
  width: 6px; height: 25px;
  background: var(--drum-rim);
}
.hightam span:before, .midtam span:before { top: 0;    left: -5px; width: 8px; height: 5px;  background: var(--drum-rim); }
.hightam span:after, .midtam span:after  { top: 33px; left: -1px; width: 7px; height: 13px; background: var(--drum-foot); }

/* =====================================================
   CYMBAL — forma base (triângulo)
===================================================== */
.cymbal {
  position: absolute;
  top: 0; left: 0;
  width: 0; height: 0;
  border-bottom: 7px solid var(--cymbal);
  border-left: 40px solid transparent;
  border-right: 40px solid transparent;
  transform-origin: top center;
}

/* =====================================================
   RIDE CYMBAL (condução) — mais à esquerda do surdo
   GEOMETRIA CORRIGIDA:
   - apex do prato: left 50px / top 14px (container)
   - haste: 14 → 40 | cano: 40 → 176 (linha do chão: y=284 global)
   - tripé: pernas a 55px / ±25° partindo de y=126 (container)
===================================================== */
.ride-cymbal {
  position: absolute;
  top: 108px; left: -55px;
  width: 90px; height: 200px;
  cursor: pointer;
}
.ride-cymbal .cymbal {
  top: 14px;
  left: 5px;
  border-bottom: 9px solid var(--cymbal);
  border-left: 45px solid transparent;
  border-right: 45px solid transparent;
  transform: rotate(20deg);
  transform-origin: top center;
}
.ride-cymbal span:nth-of-type(1) {
  display: block; position: absolute;
  top: 14px; left: 50px;
  width: 3px; height: 26px;
  background: var(--drum-rim);
}
.ride-cymbal span:nth-of-type(1):after {
  bottom: -5px; left: -1px;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--drum-foot);
}
.ride-cymbal span:nth-of-type(2) {
  display: block; position: absolute;
  top: 40px; left: 50px;
  width: 3px; height: 136px;
  background: var(--drum-rim);
}
.ride-cymbal span:nth-of-type(2):before {
  top: 86px; left: 0; width: 3px; height: 55px;
  background: var(--drum-rim);
  transform-origin: top center; transform: rotate(25deg);
}
.ride-cymbal span:nth-of-type(2):after {
  top: 86px; left: 0; width: 3px; height: 55px;
  background: var(--drum-rim);
  transform-origin: top center; transform: rotate(-25deg);
}

/* =====================================================
   CRASH CYMBAL (ataque) — entre a caixa e o chimbal
   - apex do prato: left 38px / top 14px (container em top:55px)

  background: var(--drum-rim);
  transform-origin: top center; transform: rotate(25deg);
}
.crash-cymbal span:nth-of-type(2):after {
  top: 139px; left: 0; width: 3px; height: 55px;
  background: var(--drum-rim);
  transform-origin: top center; transform: rotate(-25deg);
}

/* =====================================================
   HI-HAT (chimbal)
   GEOMETRIA CORRIGIDA:
   - cano central alinhado ao apex (left 39px), 0 → 174
   - tripé: pernas a 55px / ±25° partindo de y=124 (container)
===================================================== */
.hi-hat-cymbal {
  position: absolute;
  top: 110px; right: 0;
  width: 80px; height: 190px;
}
.hi-hat-cymbal .cymbal.top  { top: 15px; }
.hi-hat-cymbal .cymbal.bottom {
  top: 28px;
  border-bottom: none;
  border-top: 5px solid var(--cymbal);
}
.hi-hat-cymbal span {
  display: block;
  top: 0px; left: 39px;
  width: 3px; height: 174px;
  background: var(--drum-rim);
}
.hi-hat-cymbal span:before {
  top: 124px; left: 0; width: 3px; height: 55px;
  background: var(--drum-rim);
  transform-origin: top center; transform: rotate(25deg);
}
.hi-hat-cymbal span:after {
  top: 124px; left: 0; width: 3px; height: 55px;
  background: var(--drum-rim);
  transform-origin: top center; transform: rotate(-25deg);
}

/* =====================================================
   ANIMAÇÕES — só disparam via classe JS
===================================================== */

/* BASS — head pulsa ao clicar */
@keyframes anim-bass {
  0%   { transform: scale(1.0); }
  20%  { transform: scale(1.06); }
  40%  { transform: scale(0.97); }
  60%  { transform: scale(1.03); }
  80%  { transform: scale(0.99); }
  100% { transform: scale(1.0); }
}
.bass.hit .head { animation: anim-bass 0.35s ease-out; }

/* SNARE — tam chacoalha */
@keyframes anim-snare {
  0%   { transform: rotate(0deg); }
  20%  { transform: rotate(6deg); }
  50%  { transform: rotate(-5deg); }
  75%  { transform: rotate(3deg); }
  100% { transform: rotate(0deg); }
}
.snare.hit .tam { animation: anim-snare 0.25s ease-out; }

/* HIGH/MID TOM — tam chacoalha */
@keyframes anim-hightam {
  0%   { transform: rotate(0deg); }
  25%  { transform: rotate(8deg); }
  60%  { transform: rotate(-6deg); }
  100% { transform: rotate(0deg); }
}
.hightam.hit .tam, .midtam.hit .tam { animation: anim-hightam 0.25s ease-out; }

/* FLOOR TOM — tam balança */
@keyframes anim-floor {
  0%   { transform: rotate(0deg); }
  25%  { transform: rotate(4deg); }
  60%  { transform: rotate(-3deg); }
  100% { transform: rotate(0deg); }
}
.floor.hit .tam { animation: anim-floor 0.28s ease-out; }

/* RIDE — prato balança */
@keyframes anim-ride {
  0%   { transform: rotate(20deg); }
  20%  { transform: rotate(38deg); }
  50%  { transform: rotate(10deg); }
  75%  { transform: rotate(25deg); }
  100% { transform: rotate(20deg); }
}
.ride-cymbal.hit .cymbal { animation: anim-ride 0.5s ease-out; }

/* CRASH — prato balança */
@keyframes anim-crash {
  0%   { transform: rotate(25deg); }
  20%  { transform: rotate(5deg); }
  50%  { transform: rotate(40deg); }
  75%  { transform: rotate(18deg); }
  100% { transform: rotate(25deg); }
}
.crash-cymbal.hit .cymbal { animation: anim-crash 0.5s ease-out; }

/* HI-HAT — prato de cima desce e sobe */
@keyframes anim-hihat {
  0%   { top: 15px; }
  30%  { top: 27px; }
  65%  { top: 12px; }
  100% { top: 15px; }
}
.hi-hat-cymbal.hit .cymbal.top { animation: anim-hihat 0.3s ease-out; }

/* Flash de brilho em TODOS os clicáveis */
@keyframes anim-flash {
  0%   { filter: brightness(1); }
  20%  { filter: brightness(1.9) saturate(1.3); }
  100% { filter: brightness(1); }
}
.bass.hit,
.floor.hit,
.snare.hit,
.hightam.hit,
.midtam.hit,
.ride-cymbal.hit,
.crash-cymbal.hit,
.hi-hat-cymbal.hit {
  animation: anim-flash 0.3s ease-out;
}

/* Hover sutil */
.bass:hover,
.floor:hover,
.snare:hover,
.hightam:hover,
.midtam:hover { filter: brightness(1.12); }
.hi-hat-cymbal:hover,
.ride-cymbal:hover,
.crash-cymbal:hover { filter: brightness(1.18); }

/* =====================================================
   RIPPLE
===================================================== */
.ripple {
  position: absolute;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.85);
  pointer-events: none;
  animation: rippleOut 0.6s ease-out forwards;
  transform: translate(-50%,-50%);
  z-index: 99;
}
@keyframes rippleOut {
  from { width: 8px;   height: 8px;   opacity: 0.95; }
  to   { width: 110px; height: 110px; opacity: 0; border-width: 0.5px; }
}
.ripple2 {
  position: absolute;
  border-radius: 50%;
  border: 1.5px solid rgba(255,255,255,0.45);
  pointer-events: none;
  animation: rippleOut 0.7s 0.1s ease-out forwards;
  transform: translate(-50%,-50%);
  z-index: 99;
}

/* =====================================================
   INFO PANEL
===================================================== */
#panel {
  position: fixed;
  bottom: 60px; left: 50%;
  transform: translateX(-50%) translateY(12px);
  opacity: 0;
  transition: opacity 0.28s, transform 0.28s;
  pointer-events: none;
  background: rgba(30,30,30,0.97);
  border: 1px solid rgba(255,255,255,0.15);
  border-top: 3px solid #c9ced6;
  border-radius: 10px;
  padding: 14px 22px;
  width: min(400px, 90vw);
  z-index: 200;
}
#panel.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
  pointer-events: auto;
}
#panel .pname {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.8rem;
  color: #ffffff;
  letter-spacing: 0.12em;
  line-height: 1;
}
#panel .pen {
  font-size: 0.65rem; color: #aaaaaa;
  text-transform: uppercase; letter-spacing: 0.2em;
  margin-bottom: 7px; font-family: monospace;
}
#panel .pdesc {
  font-size: 0.85rem; color: #e0e0e0;
  line-height: 1.55; font-family: monospace;
}
#panel .bars {
  margin-top: 9px;
  display: flex; align-items: flex-end; gap: 4px;
}
#panel .bar {
  width: 3px; background: #c9ced6; border-radius: 2px;
  animation: barB 0.4s ease-in-out infinite alternate;
}
#panel .bar:nth-child(1){ height:10px; }
#panel .bar:nth-child(2){ height:6px;  animation-delay:.08s; }
#panel .bar:nth-child(3){ height:16px; animation-delay:.16s; }
#panel .bar:nth-child(4){ height:8px;  animation-delay:.04s; }
#panel .bar:nth-child(5){ height:12px; animation-delay:.12s; }
@keyframes barB { from{transform:scaleY(0.3)} to{transform:scaleY(1)} }
#panel .plbl {
  font-size: 0.56rem; color: #aaaaaa;
  text-transform: uppercase; letter-spacing: 0.18em;
  margin-left: 6px; align-self: center; font-family: monospace;
}

/* =====================================================
   KEYBOARD HINTS
===================================================== */
#hints {
  position: fixed; bottom: 12px; left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 6px; flex-wrap: wrap;
  justify-content: center; z-index: 200;
}
.hint {
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 4px; padding: 3px 9px;
  font-size: 0.62rem; color: #c6cad1;
  letter-spacing: 0.12em; text-transform: uppercase;
  font-family: monospace;
}
.hint b { color: #ffffff; }

/* TITLE */
#title {
  position: fixed; top: 14px; left: 50%;
  transform: translateX(-50%);
  font-family: 'Bebas Neue', sans-serif;
  font-size: clamp(1.2rem,4vw,1.8rem);
  color: #ffffff;
  letter-spacing: 0.25em;
  opacity: 0.9;
  z-index: 200;
}

/* =====================================================
   PRODUÇÃO: acessibilidade, responsivo, reduced motion
===================================================== */
[data-id]:focus-visible {
  outline: 2px solid #e6e9ee;
  outline-offset: 4px;
  border-radius: 6px;
}
/* Escala do kit: calculada dinamicamente pelo JS (fitKit) para preencher a tela */
@media (prefers-reduced-motion: reduce) {
  .bass.hit .head, .snare.hit .tam,
  .hightam.hit .tam, .midtam.hit .tam, .floor.hit .tam,
  .ride-cymbal.hit .cymbal, .crash-cymbal.hit .cymbal,
  .hi-hat-cymbal.hit .cymbal.top,
  .bass.hit, .floor.hit, .snare.hit, .hightam.hit, .midtam.hit,
  .ride-cymbal.hit, .crash-cymbal.hit, .hi-hat-cymbal.hit,
  .ripple, .ripple2, #panel .bar {
    animation: none !important;
  }
}

<script>
/* ═══════════════════════════════════════
   AUDIO ENGINE
═══════════════════════════════════════ */
let AC;
const ac = () => {
  if (!AC) AC = new (window.AudioContext || window.webkitAudioContext)();
  if (AC.state === 'suspended') AC.resume();
  return AC;
};
const mkN = s => {
  const a=ac(), l=Math.ceil(a.sampleRate*s),
        b=a.createBuffer(1,l,a.sampleRate), d=b.getChannelData(0);
  for (let i=0;i<l;i++) d[i]=Math.random()*2-1;
  const n=a.createBufferSource(); n.buffer=b; return n;
};
const mkO = (t,f) => { const o=ac().createOscillator(); o.type=t; o.frequency.value=f; return o; };
const mkG = v     => { const g=ac().createGain(); g.gain.value=v; return g; };
const pipe = (...n) => { for(let i=0;i<n.length-1;i++) n[i].connect(n[i+1]); };
const D = () => ac().destination;

const sounds = {
  bumbo() {
    const a=ac(), t=a.currentTime;
    const o=mkO('sine',145), g=mkG(1.1);
    o.frequency.setValueAtTime(145,t); o.frequency.exponentialRampToValueAtTime(40,t+.34);
    g.gain.setValueAtTime(1.1,t); g.gain.exponentialRampToValueAtTime(.001,t+.48);
    const sub=mkO('sine',50), sg=mkG(.4);
    sg.gain.setValueAtTime(.4,t); sg.gain.exponentialRampToValueAtTime(.001,t+.42);
    const n=mkN(.03), nh=a.createBiquadFilter(), ng=mkG(.6);
    nh.type='bandpass'; nh.frequency.value=2500; nh.Q.value=.35;
    ng.gain.setValueAtTime(.6,t); ng.gain.exponentialRampToValueAtTime(.001,t+.03);
    pipe(o,g,D()); pipe(sub,sg,D()); pipe(n,nh,ng,D());
    o.start(t); o.stop(t+.49); sub.start(t); sub.stop(t+.43); n.start(t); n.stop(t+.031);
  },
  caixa() {
    const a=ac(), t=a.currentTime;
    const o=mkO('triangle',190), og=mkG(.5);
    o.frequency.setValueAtTime(190,t); o.frequency.exponentialRampToValueAtTime(88,t+.09);
    og.gain.setValueAtTime(.5,t); og.gain.exponentialRampToValueAtTime(.001,t+.1);
    const n=mkN(.24), hp=a.createBiquadFilter(), lp=a.createBiquadFilter(), ng=mkG(.9);
    hp.type='highpass'; hp.frequency.value=1500; lp.type='lowpass'; lp.frequency.value=9800;
    ng.gain.setValueAtTime(.9,t); ng.gain.exponentialRampToValueAtTime(.001,t+.25);
    const n2=mkN(.015), bp2=a.createBiquadFilter(), ng2=mkG(.55);
    bp2.type='bandpass'; bp2.frequency.value=4800; bp2.Q.value=.45;
    ng2.gain.setValueAtTime(.55,t); ng2.gain.exponentialRampToValueAtTime(.001,t+.015);
    pipe(o,og,D()); pipe(n,hp,lp,ng,D()); pipe(n2,bp2,ng2,D());
    o.start(t); o.stop(t+.11); n.start(t); n.stop(t+.26); n2.start(t); n2.stop(t+.016);
  },
  tom1() {
    const a=ac(), t=a.currentTime;
    const o=mkO('sine',280), g=mkG(.98);
    o.frequency.setValueAtTime(280,t); o.frequency.exponentialRampToValueAtTime(112,t+.22);
    g.gain.setValueAtTime(.98,t); g.gain.exponentialRampToValueAtTime(.001,t+.32);
    const n=mkN(.036), nb=a.createBiquadFilter(), ng=mkG(.43);
    nb.type='bandpass'; nb.frequency.value=1800; nb.Q.value=.55;
    ng.gain.setValueAtTime(.43,t); ng.gain.exponentialRampToValueAtTime(.001,t+.036);
    pipe(o,g,D()); pipe(n,nb,ng,D());
    o.start(t); o.stop(t+.33); n.start(t); n.stop(t+.037);
  },
  tom2() {
    const a=ac(), t=a.currentTime;
    const o=mkO('sine',235), g=mkG(1.0);
    o.frequency.setValueAtTime(235,t); o.frequency.exponentialRampToValueAtTime(92,t+.27);
    g.gain.setValueAtTime(1.0,t); g.gain.exponentialRampToValueAtTime(.001,t+.4);
    const n=mkN(.038), nb=a.createBiquadFilter(), ng=mkG(.44);
    nb.type='bandpass'; nb.frequency.value=1500; nb.Q.value=.55;
    ng.gain.setValueAtTime(.44,t); ng.gain.exponentialRampToValueAtTime(.001,t+.038);
    pipe(o,g,D()); pipe(n,nb,ng,D());
    o.start(t); o.stop(t+.41); n.start(t); n.stop(t+.039);
  },
  surdo() {
    const a=ac(), t=a.currentTime;
    const o=mkO('sine',190), g=mkG(1.04);
    o.frequency.setValueAtTime(190,t); o.frequency.exponentialRampToValueAtTime(68,t+.40);
    g.gain.setValueAtTime(1.04,t); g.gain.exponentialRampToValueAtTime(.001,t+.55);
    const sub=mkO('sine',50), sg=mkG(.42);
    sg.gain.setValueAtTime(.42,t); sg.gain.exponentialRampToValueAtTime(.001,t+.48);
    const n=mkN(.04), nb=a.createBiquadFilter(), ng=mkG(.45);
    nb.type='bandpass'; nb.frequency.value=1050; nb.Q.value=.5;
    ng.gain.setValueAtTime(.45,t); ng.gain.exponentialRampToValueAtTime(.001,t+.04);
    pipe(o,g,D()); pipe(sub,sg,D()); pipe(n,nb,ng,D());
    o.start(t); o.stop(t+.56); sub.start(t); sub.stop(t+.49); n.start(t); n.stop(t+.041);
  },
  chimbal() {
    const a=ac(), t=a.currentTime;
    const n=mkN(.14), hp=a.createBiquadFilter(), bp=a.createBiquadFilter(), g=mkG(.72);
    hp.type='highpass'; hp.frequency.value=7200;
    bp.type='bandpass'; bp.frequency.value=11800; bp.Q.value=.7;
    g.gain.setValueAtTime(.72,t); g.gain.exponentialRampToValueAtTime(.001,t+.15);
    pipe(n,hp,bp,g,D()); n.start(t); n.stop(t+.15);
  },
  conducao() {
    const a=ac(), t=a.currentTime;
    const n=mkN(.7), hp=a.createBiquadFilter(), bp=a.createBiquadFilter(), g=mkG(.6);
    hp.type='highpass'; hp.frequency.value=4500;
    bp.type='bandpass'; bp.frequency.value=8000; bp.Q.value=1.2;
    g.gain.setValueAtTime(.6,t); g.gain.exponentialRampToValueAtTime(.001,t+.7);
    const o=mkO('sine',2100), og=mkG(.22);
    og.gain.setValueAtTime(.22,t); og.gain.exponentialRampToValueAtTime(.001,t+.45);
    pipe(n,hp,bp,g,D()); pipe(o,og,D());
    n.start(t); n.stop(t+.71); o.start(t); o.stop(t+.46);
  },
  ataque() {
    const a=ac(), t=a.currentTime;
    const n=mkN(1.7), hp=a.createBiquadFilter(), lp=a.createBiquadFilter(), g=mkG(.88);
    hp.type='highpass'; hp.frequency.value=3200; lp.type='lowpass'; lp.frequency.value=16500;
    g.gain.setValueAtTime(.88,t); g.gain.exponentialRampToValueAtTime(.001,t+1.7);
    const n2=mkN(.024), hp2=a.createBiquadFilter(), g2=mkG(.74);
    hp2.type='highpass'; hp2.frequency.value=5200;
    g2.gain.setValueAtTime(.74,t); g2.gain.exponentialRampToValueAtTime(.001,t+.024);
    pipe(n,hp,lp,g,D()); pipe(n2,hp2,g2,D());
    n.start(t); n.stop(t+1.71); n2.start(t); n2.stop(t+.025);
  }
};

/* ═══════════════════════════════════════
   INTERACTION
═══════════════════════════════════════ */
const panel  = document.getElementById('panel');
const pname  = document.getElementById('pname');
const pen    = document.getElementById('pen');
const pdesc  = document.getElementById('pdesc');
const wrapper = document.querySelector('.wrapper');
let panelTimer;

const keyMap = { b:'bumbo', c:'caixa', t:'tom1', y:'tom2', s:'surdo', h:'chimbal', r:'conducao', a:'ataque' };

const pieceMap = {};
document.querySelectorAll('[data-id]').forEach(el => {
  pieceMap[el.dataset.id] = el;
});

function spawnRipple(el) {
  const wRect = wrapper.getBoundingClientRect();
  const eRect = el.getBoundingClientRect();
  const s = wRect.width / KIT_W; // compensa a escala dinâmica do kit
  const cx = (eRect.left + eRect.width  / 2 - wRect.left) / s;
  const cy = (eRect.top  + eRect.height / 2 - wRect.top)  / s;

  ['ripple','ripple2'].forEach(cls => {
    const r = document.createElement('div');
    r.className = cls;
    r.style.left = cx + 'px';
    r.style.top  = cy + 'px';
    wrapper.appendChild(r);
    r.addEventListener('animationend', () => r.remove());
  });
}

function trigger(id) {
  const el = pieceMap[id];
  if (!el) return;

  // Audio
  try { if (sounds[id]) sounds[id](); } catch(e) {}

  // Panel
  pname.textContent = el.dataset.name;
  pen.textContent   = el.dataset.en;
  pdesc.textContent = el.dataset.desc;
  panel.classList.add('show');
  clearTimeout(panelTimer);
  panelTimer = setTimeout(() => panel.classList.remove('show'), 5000);

  // Animação: remove → força reflow → adiciona de novo
  el.classList.remove('hit');
  void el.offsetWidth;
  el.classList.add('hit');
  el.addEventListener('animationend', () => el.classList.remove('hit'), { once: true });

  // Ripple
  spawnRipple(el);
}

document.querySelectorAll('[data-id]').forEach(el => {
  // Acessibilidade: foco por teclado + semântica de botão
  el.tabIndex = 0;
  el.setAttribute('role', 'button');
  el.setAttribute('aria-label', el.dataset.name + ' (' + el.dataset.en + ') — tecla ' + el.dataset.key);

  el.addEventListener('click', () => trigger(el.dataset.id));
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); trigger(el.dataset.id); }
  });
});

document.addEventListener('keydown', e => {
  if (e.repeat) return;
  if (e.target !== document.body && e.target.dataset && e.target.dataset.id) return;
  const k = e.key.toLowerCase();
  if (keyMap[k]) { e.preventDefault(); trigger(keyMap[k]); }
});

/* ═══════════════════════════════════════
   ESCALA DINÂMICA — kit preenche a tela
   O conteúdo visível ocupa y≈55..300 do wrapper (altura útil 245px,
   centro em y=177 → 27px abaixo do centro do wrapper; compensado no translateY)
═══════════════════════════════════════ */
const KIT_W = 400, KIT_VISIBLE_H = 245;
function fitKit() {
  const s = Math.min(
    (window.innerWidth  * 0.92) / KIT_W,
    (window.innerHeight * 0.64) / KIT_VISIBLE_H
  );
  wrapper.style.transform = 'scale(' + s.toFixed(3) + ') translateY(-27px)';
}
window.addEventListener('resize', fitKit);
fitKit();
</script>
</body>
